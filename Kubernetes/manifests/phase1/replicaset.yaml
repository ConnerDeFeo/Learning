apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: k8s-course-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-course-app
  template:
    metadata:
      labels:
        app: k8s-course-app
    spec:
      containers:
        - name: k8s-course-app
          image: k8s-course-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000